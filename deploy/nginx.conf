# Nginx 配置 - project-template
# 放置位置: /etc/nginx/conf.d/project-template.conf
# 使用方法: sudo nginx -t && sudo nginx -s reload

server {
    listen 80;
    server_name your-domain.com;  # 改为实际域名或 IP

    # 前端静态文件（需先执行 cd frontend && npm run build）
    root /path/to/project-template/frontend/dist;
    index index.html;

    # React BrowserRouter：刷新业务路由时回退到前端入口。
    try_files $uri $uri/ /index.html;

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:3101/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时设置（AI 问数等长请求）
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 用户头像等上传资源
    location /uploads/ {
        proxy_pass http://127.0.0.1:3101/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
