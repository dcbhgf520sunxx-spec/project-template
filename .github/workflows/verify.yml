name: Verify

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: verify-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pms
          POSTGRES_PASSWORD: pms123456
          POSTGRES_DB: project_template
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pms -d project_template"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - name: Initialize database
        env:
          PGPASSWORD: pms123456
        run: psql -h 127.0.0.1 -U pms -d project_template -v ON_ERROR_STOP=1 -f backend/db/init/001_schema.sql
      - name: Run migrations
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: pms
          DB_PASSWORD: pms123456
          DB_NAME: project_template
        run: npm run db:migrate -- --baseline
        working-directory: backend
      - name: Verify
        env:
          DELIVERY_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          RUN_DB_INTEGRATION: 1
          INTEGRATION_DB_ISOLATED: 1
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: pms
          DB_PASSWORD: pms123456
          DB_NAME: project_template
          JWT_SECRET: ci-only-project-template-secret
          CORS_ORIGIN: http://localhost:3102
          NODE_ENV: test
        run: node scripts/verify-change.mjs
      - name: Install browser
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Run browser acceptance
        env:
          INTEGRATION_DB_ISOLATED: 1
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: pms
          DB_PASSWORD: pms123456
          DB_NAME: project_template
          JWT_SECRET: ci-only-project-template-secret
        run: npm run test:e2e
        working-directory: frontend
